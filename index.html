<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pedido de Convite | Crispoparte</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f8f3ef;
      --card: #ffffff;
      --ink: #5c4037;
      --soft: #8f6f66;
      --accent: #c79d8a;
      --accent-light: #f3e5de;
      --whatsapp: #25D366;
      --shadow: 0 12px 30px rgba(92, 64, 55, 0.1);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Nunito', sans-serif;
      background-color: var(--bg);
      color: var(--ink);
    }

    .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; display: grid; grid-template-columns: 1fr 380px; gap: 30px; }

    header { grid-column: 1 / -1; text-align: center; margin-bottom: 20px; }
    header h1 { font-family: 'Cormorant Garamond', serif; font-size: 3rem; margin: 0; color: var(--ink); }
    header p { color: var(--soft); letter-spacing: 1px; text-transform: uppercase; font-size: 0.9rem; margin-top: 5px; }

    .card { background: var(--card); border-radius: 24px; padding: 30px; box-shadow: var(--shadow); border: 1px solid #ead9d1; }
    h2 { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; margin-top: 0; border-bottom: 1px solid var(--accent-light); padding-bottom: 10px; margin-bottom: 20px; }

    .form-section { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
    .full-width { grid-column: 1 / -1; }
    label { display: block; font-weight: 700; font-size: 0.85rem; margin-bottom: 5px; color: var(--ink); }
    input, select, textarea {
      width: 100%; padding: 12px; border: 1px solid #ead9d1; border-radius: 12px; 
      font-family: inherit; font-size: 0.95rem; outline: none; transition: 0.2s;
    }

    .servico-box { background: #fdfaf8; padding: 20px; border-radius: 18px; border: 1px solid var(--accent-light); margin-top: 20px; }
    .btn { border: none; border-radius: 12px; padding: 12px 20px; cursor: pointer; font-weight: 700; transition: 0.3s; }
    .btn-add { background: var(--accent); color: white; width: 100%; margin-top: 10px; }
    
    .item-no-carrinho { 
      display: flex; justify-content: space-between; align-items: center; 
      padding: 12px; border-bottom: 1px solid var(--accent-light); font-size: 0.9rem;
    }
    .remove-btn { color: #b87070; cursor: pointer; font-size: 0.75rem; font-weight: bold; }

    .total-destaque { font-size: 1.8rem; color: var(--ink); margin-top: 10px; font-weight: 700; }
    .btn-whatsapp { background: var(--whatsapp); color: white; width: 100%; padding: 18px; font-size: 1.1rem; margin-top: 20px; cursor: pointer; }

    .pix-info { background: #e7f3ef; color: #2d5a4c; padding: 15px; border-radius: 12px; font-size: 0.85rem; margin-top: 20px; text-align: center; }

    @media (max-width: 850px) { .container { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<header>
  <p>Crispoparte | Design Digital</p>
  <h1>Dados do Convite</h1>
</header>

<div class="container">
  <main>
    <div class="card">
      <h2>Informações do Evento</h2>
      <div class="form-section">
        <div class="full-width"><label>Nome do(a) Aniversariante*</label><input type="text" id="nome_aniv"></div>
        <div><label>Idade*</label><input type="text" id="idade_aniv"></div>
        <div><label>Tema*</label><input type="text" id="tema_evento"></div>
        <div><label>Data*</label><input type="date" id="data_evento"></div>
        <div><label>Hora*</label><input type="time" id="hora_evento"></div>
        <div class="full-width"><label>Local do Evento*</label><input type="text" id="local_nome"></div>
        <div class="full-width"><label>Endereço Completo</label><textarea id="local_endereco" rows="2"></textarea></div>
      </div>

      <h2>Personalização</h2>
      <div class="form-section">
        <div class="full-width">
          <label>Cenas 02 e 04 (Alterar frases?)</label>
          <textarea id="frases_personalizadas" rows="2" placeholder="Digite aqui caso queira mudar os textos padrão das cenas 02 e 04."></textarea>
        </div>
        <div class="full-width">
          <label>Cena 06 (Observação curta abaixo do endereço)</label>
          <input type="text" id="obs_cena6" placeholder="Ex: Traje de banho obrigatório">
        </div>
        <div class="full-width">
          <label>Música Preferida (Link ou Nome)</label>
          <input type="text" id="musica_link" placeholder="Música específica ou 'mesma do modelo'">
        </div>
      </div>

      <div class="servico-box">
        <label>Escolha os itens do seu convite:</label>
        <select id="select_servico" class="full-width" style="margin-bottom: 10px;"></select>
        <button class="btn btn-add" onclick="adicionar()">+ Incluir no meu pedido</button>
        <div id="carrinho_lista" style="margin-top:15px;"></div>
      </div>
    </div>
  </main>

  <aside>
    <div class="card" style="position: sticky; top: 20px;">
      <h2>Resumo do Valor</h2>
      <p style="font-size: 0.85rem; color: var(--soft);">O início da produção ocorre após a confirmação do pagamento integral.</p>
      
      <div style="margin-top: 20px;">
        <span style="font-size: 0.9rem; font-weight: 700;">VALOR TOTAL A VISTA:</span>
        <div class="total-destaque" id="res_total">R$ 0,00</div>
      </div>

      <div class="pix-info">
        <strong>PAGAMENTO EXCLUSIVO VIA PIX</strong><br>
        Chave: 71993233142 (Cris Oliveira)
      </div>

      <button class="btn btn-whatsapp" onclick="enviar()">
        Confirmar Pedido no WhatsApp 💌
      </button>
    </div>
  </aside>
</div>

<script>
// ============================================================
// CONFIGURAÇÃO DE PREÇOS (MUDE AQUI QUANDO PRECISAR)
// ============================================================
const SERVICOS = [
  { nome: "Convite Animado em Vídeo", preco: 75.00 },
  { nome: "Arte Auxiliar em PDF (Botões)", preco: 30.00 },
  { nome: "Taxa de Urgência (Entrega 24h)", preco: 25.00 },
  { nome: "Remoção de Créditos Finais", preco: 10.00 },
  { nome: "Convite Digital Estático", preco: 40.00 }
];
// ============================================================

let carrinho = [];

// Carrega os serviços no select
const select = document.getElementById('select_servico');
SERVICOS.forEach((s, i) => {
  let opt = document.createElement('option');
  opt.value = i;
  opt.text = `${s.nome} - R$ ${s.preco.toFixed(2)}`;
  select.add(opt);
});

function adicionar() {
  const s = SERVICOS[select.value];
  if(carrinho.find(item => item.nome === s.nome)) return alert("Já adicionado!");
  carrinho.push(s);
  renderizar();
}

function remover(i) {
  carrinho.splice(i, 1);
  renderizar();
}

function renderizar() {
  const lista = document.getElementById('carrinho_lista');
  const total = carrinho.reduce((acc, it) => acc + it.preco, 0);
  
  lista.innerHTML = carrinho.map((it, i) => `
    <div class="item-no-carrinho">
      <span>${it.nome}</span>
      <span>R$ ${it.preco.toFixed(2)} <span class="remove-btn" onclick="remover(${i})">[X]</span></span>
    </div>
  `).join('');
  
  document.getElementById('res_total').innerText = `R$ ${total.toFixed(2)}`;
}

function enviar() {
  const total = document.getElementById('res_total').innerText;
  const nome = document.getElementById('nome_aniv').value;
  
  if(!nome || carrinho.length === 0) return alert("Preencha o nome e selecione o serviço!");

  let msg = `✨ *PEDIDO CONFIRMADO - CRISPOPARTE* ✨\n\n`;
  msg += `👤 *Aniversariante:* ${nome} (${document.getElementById('idade_aniv').value})\n`;
  msg += `🎈 *Tema:* ${document.getElementById('tema_evento').value}\n`;
  msg += `📅 *Data:* ${document.getElementById('data_evento').value} às ${document.getElementById('hora_evento').value}\n`;
  msg += `📍 *Local:* ${document.getElementById('local_nome').value}\n\n`;
  
  msg += `📝 *DADOS DE CRIAÇÃO:* \n`;
  msg += `- Frases (Cenas 02/04): ${document.getElementById('frases_personalizadas').value || 'Padrão'}\n`;
  msg += `- Obs (Cena 06): ${document.getElementById('obs_cena6').value || 'Nenhuma'}\n`;
  msg += `- Música: ${document.getElementById('musica_link').value || 'Padrão'}\n\n`;

  msg += `🛒 *ÍTENS DO PEDIDO:* \n`;
  carrinho.forEach(it => msg += `• ${it.nome}: R$ ${it.preco.toFixed(2)}\n`);

  msg += `\n💰 *TOTAL À VISTA (PIX):* \n`;
  msg += `*${total}*\n\n`;
  msg += `⚠️ _A produção será iniciada após o envio do comprovante._`;

  window.open(`https://wa.me/5571993233142?text=${encodeURIComponent(msg)}`, '_blank');
}
</script>

</body>
</html>
